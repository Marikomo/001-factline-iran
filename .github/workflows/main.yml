name: FactLine_Auto_Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *' # 1日2回自動実行（必要に応じて調整）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run news script
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python main.py
