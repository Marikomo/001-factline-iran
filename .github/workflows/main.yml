name: FactLine_Auto_Update

on:
  schedule:
    # 1. 日本時間 午前6時 (UTC 21:00)
    - cron: '0 21 * * *'
    # 2. 日本時間 午後18時 (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動ボタンも残しておきます

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run news script
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python main.py
