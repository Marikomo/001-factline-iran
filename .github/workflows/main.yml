name: FactLine_Auto_Update

on:
  schedule:
    # 毎日、日本時間の「午前9時」に実行する設定（UTC 00:00）
    # テキサス時間（中部標準時）だと、夜の18:00か19:00頃になります
    - cron: '0 0 * * *'
  workflow_dispatch: # これを消さなければ、今まで通り「手動ボタン」も使えます

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run news script
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python main.py
