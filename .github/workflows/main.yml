name: FactLine_Auto_Update

on:
  schedule:
    # 日本時間 午前6時 (UTC 21:00)
    - cron: '0 21 * * *'
    # 日本時間 午後18時 (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3からv4へアップデート

      - name: Set up Python
        uses: actions/setup-python@v5  # v4からv5へアップデート
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests yfinance

      - name: Run scripts
        env:
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
          # 今後のためにGEMINIのキーも一応入れておくと安心です
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py
          python market.py

        
